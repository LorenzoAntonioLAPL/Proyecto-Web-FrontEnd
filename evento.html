<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Evento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .card {
            border-radius: 12px;
        }

        .card-title {
            font-weight: 600;
        }
    </style>

</head>

<body class="bg-light">

    <div class="container mt-4">
        <div id="alerta"></div>
        <h2 class="text-center mb-4">Configurar Intercambio</h2>
        <div class="row g-4">

            <!-- CARD PARTICIPANTES -->
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">

                        <h5 class="card-title mb-3">Participantes</h5>

                        <div class="mb-3">
                            <label class="form-label">Nombre del organizador</label>
                            <input type="text" id="organizador" class="form-control">
                        </div>

                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="participa">
                            <label class="form-check-label">
                                El organizador participa
                            </label>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Agregar participante</label>

                            <div class="input-group">
                                <input type="text" id="nuevoParticipante" class="form-control">
                                <button class="btn btn-success" onclick="agregarParticipante()">Agregar</button>
                            </div>

                        </div>

                        <ul id="listaParticipantes" class="list-group"></ul>
                    </div>
                </div>
            </div>

            <!-- CARD EXCLUSIONES -->
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">Exclusiones</h5>

                        <p class="small text-muted">
                            Arrastra un participante aquí y luego selecciona con quién no puede
                        </p>

                        <div id="zonaExclusion"
                            class="border rounded p-4 bg-light text-center"
                            style="min-height:150px; border-style:dashed;">

                            <p class="text-muted m-0">
                                Arrastra aquí un participante
                            </p>
                        </div>

                    </div>
                </div>
            </div>

            <!-- CARD DATOS DEL EVENTO -->
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Datos del evento</h5>

                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Nombre celebración</label>
                                <input type="text" id="celebracion" class="form-control">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fecha</label>
                                <input type="date" id="fecha" class="form-control">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Presupuesto</label>
                                <input type="number" id="presupuesto" class="form-control">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary mt-4 w-100" onclick="guardarEvento()">
            Guardar Evento
        </button>

    </div>

    <script src="script/evento.js"></script>

</body>
</html>
