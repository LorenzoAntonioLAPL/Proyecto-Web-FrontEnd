<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Evento</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">Configurar Intercambio</h2>

    <div class="row">
        <div class="col-12 col-md-6">
            <div class="mb-3">
                <label class="form-label">Nombre del organizador</label>
                <input type="text" id="organizador" class="form-control">
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="participa">
                <label class="form-check-label">El organizador participa</label>
            </div>

            <div class="mb-3">
                <label class="form-label">Agregar participante</label>
                <div class="input-group">
                    <input type="text" id="nuevoParticipante" class="form-control">
                    <button class="btn btn-success" onclick="agregarParticipante()">Agregar</button>
                </div>
            </div>

        <ul id="listaParticipantes" class="list-group mb-4"></ul>

        </div>

        <div class="col-12 col-md-6">
            <h5>Zona para crear exclusiones</h5>
            <p class="small text-muted">Arrastra un participante aquí y luego selecciona con quién no puede</p>
            <div id="zonaExclusion" class="border rounded p-4 bg-white" style="min-height:150px;"></div>
        </div>
    </div>

    <hr>

    <div class="row mt-3">
        <div class="col-12 col-md-6">
            <label>Nombre celebración</label>
            <input type="text" id="celebracion" class="form-control">
        </div>

        <div class="col-12 col-md-6">
            <label>Fecha</label>
            <input type="date" id="fecha" class="form-control">
        </div>
    </div>

    <div class="mt-3">
        <label>Presupuesto</label>
        <input type="number" id="presupuesto" class="form-control">
    </div>

    <button class="btn btn-primary mt-4 w-100" onclick="guardarEvento()">Guardar Evento</button>
    
</div>

<script src="js/script.js"></script>
</body>
</html>
